<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EchoMind - AI英语教练</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .animate-fade { animation: fadeIn 0.4s ease-out; }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 黄金词汇高亮动画 */
    .golden-highlight {
      background-color: #fef3c7; /* amber-100 */
      color: #92400e; /* amber-800 */
      border-bottom: 2px solid #f59e0b; /* amber-500 */
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased selection:bg-amber-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;
    const { createRoot } = ReactDOM;
    const { createClient } = supabase;

    // --- Config ---
    const SUPABASE_URL = "https://kizandyfonohbbnxxvzf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ah_LeCeQ8Zwe2Z_v_cQavw_Cj-EVZkE";
    const SILICON_KEY = "sk-trzkhxflazgegemorowwscodqnzcdzbtnhujpacxxicwwchn";
    
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // User ID
    const getUserId = () => {
      let uid = localStorage.getItem('em_uid');
      if (!uid) { 
        if (typeof crypto !== 'undefined' && crypto.randomUUID) {
            uid = crypto.randomUUID();
        } else {
            uid = 'user-' + Math.random().toString(36).substr(2, 9);
        }
        localStorage.setItem('em_uid', uid); 
      }
      return uid;
    };
    const USER_ID = getUserId();

    // --- Expanded Grammar List (20 items) ---
    const GRAMMAR_LIST = [
      { id: 'simple_present', title: '一般现在时', structure: 'Simple Present', explanation: '表示经常性的动作、状态或客观真理' },
      { id: 'present_cont', title: '现在进行时', structure: 'Present Continuous', explanation: '表示正在进行的动作' },
      { id: 'simple_past', title: '一般过去时', structure: 'Simple Past', explanation: '表示过去某个时间发生的动作' },
      { id: 'present_perf', title: '现在完成时', structure: 'Present Perfect', explanation: 'Have done... 强调过去动作对现在的影响' },
      { id: 'simple_future', title: '一般将来时', structure: 'Simple Future', explanation: 'Will do... 表示将要发生的动作' },
      { id: 'past_cont', title: '过去进行时', structure: 'Past Continuous', explanation: '表示过去某时刻正在进行的动作' },
      { id: 'past_perf', title: '过去完成时', structure: 'Past Perfect', explanation: 'Had done... 表示过去的过去' },
      { id: 'future_perf', title: '将来完成时', structure: 'Future Perfect', explanation: '表示将来某时刻之前完成的动作' },
      { id: 'attr_clause', title: '定语从句', structure: 'Attributive Clause', explanation: '使用 that/which/who 修饰名词' },
      { id: 'noun_clause', title: '名词性从句', structure: 'Noun Clause', explanation: '句子作主语、宾语或表语 (What I said is...)' },
      { id: 'adv_time', title: '时间状语从句', structure: 'Time Adverbial Clause', explanation: 'When/While/Before/After...' },
      { id: 'adv_cond', title: '条件状语从句', structure: 'Conditional Clause', explanation: 'If/Unless... 表示假设' },
      { id: 'adv_reason', title: '原因状语从句', structure: 'Reason Adverbial Clause', explanation: 'Because/Since/As...' },
      { id: 'passive', title: '被动语态', structure: 'Passive Voice', explanation: 'Be done... 强调动作的承受者' },
      { id: 'inf', title: '动词不定式', structure: 'Infinitive', explanation: 'To do... 表目的、将来或作成分' },
      { id: 'gerund', title: '动名词', structure: 'Gerund', explanation: 'Doing... 动词作名词使用' },
      { id: 'subjunctive', title: '虚拟语气', structure: 'Subjunctive Mood', explanation: 'If I were you... 表示与事实相反的假设' },
      { id: 'participle', title: '分词作状语', structure: 'Participle Adverbial', explanation: 'Walking down the street, I saw...' },
      { id: 'inversion', title: '倒装句', structure: 'Inversion', explanation: 'Never have I seen... 强调语气' },
      { id: 'emphatic', title: '强调句', structure: 'Emphatic Sentence', explanation: 'It is ... that ... 强调句子的某一部分' }
    ];

    // --- Prompts ---
    const PROMPTS = {
      words: (grammarTitle, grammarStruct) => `角色:英语老师。任务:根据用户话题提供5个高级词汇。上下文:目标语法是"${grammarTitle} (${grammarStruct})"。输出JSON:{candidateWords:[{word,ipa,mean(中文)}]}`,
      // 更新：明确要求结尾提问
      chat: (words, patternTitle) => `角色:英语教练。当前重点词汇:${words}。当前重点语法:${patternTitle}。任务:1.润色用户输入(userRefinedEn)使其更地道。2.用目标语法自然回复(aiResponseEn)并附带中文翻译(aiResponseCn)。3.回复结尾必须包含一个针对话题的开放式问题以保持对话继续。输出JSON:{userRefinedEn, aiResponseEn, aiResponseCn}`,
      // 更新：明确要求复盘原始输入
      review: "任务:复盘对话。请严格针对用户的【原始输入】(user messages中的text字段)进行纠错，【不要】分析AI润色后的refined字段。指出原始输入中的语法错误和不地道表达。输出JSON:{score(0-100), corrections:[{original:用户原句, correction:修正后句子, reason:中文解释}], patternAnalysis(中文分析语法运用), weakness(中文分析弱点)}",
      hint: (ctx) => `根据上下文:${ctx}，提供3个英语回复建议。输出JSON:[{en,cn}]`
    };

    // --- Components ---
    
    // Icon 组件
    const Icon = ({ name, size = 18, className = "", onClick }) => {
      const ref = useRef(null);

      useEffect(() => {
        if (!window.lucide || !ref.current) return;
        const i = document.createElement('i');
        i.setAttribute('data-lucide', name);
        ref.current.innerHTML = '';
        ref.current.appendChild(i);
        window.lucide.createIcons({
          root: ref.current,
          nameAttr: 'data-lucide',
          attrs: { width: size, height: size, class: className }
        });
      }, [name, size, className]);

      return (
        <span 
          ref={ref}
          onClick={onClick}
          style={{ display: 'inline-flex', verticalAlign: 'middle', cursor: onClick ? 'pointer' : 'default' }}
        />
      );
    };

    const Btn = ({ onClick, children, variant = 'primary', className = "", disabled = false }) => {
      const base = "px-5 py-3 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50 disabled:pointer-events-none";
      const styles = {
        primary: "bg-teal-600 text-white shadow-lg shadow-teal-200/50 hover:bg-teal-700",
        secondary: "bg-stone-200 text-stone-700 hover:bg-stone-300",
        outline: "border-2 border-stone-200 hover:border-teal-500 hover:text-teal-600 bg-white",
        ghost: "hover:bg-stone-100 text-stone-500"
      };
      return <button onClick={onClick} disabled={disabled} className={`${base} ${styles[variant]} ${className}`}>{children}</button>;
    };

    const Header = ({ title, onHome, rightAction }) => (
      <div className="flex items-center justify-between mb-6">
        <button onClick={onHome} className="p-2 -ml-2 text-stone-400 hover:text-teal-600 hover:bg-stone-100 rounded-full transition-colors flex items-center gap-1">
          <Icon name="home" size={18} />
          <span className="text-xs font-bold">首页</span>
        </button>
        {title && <h2 className="text-sm font-bold text-stone-500 uppercase tracking-wider">{title}</h2>}
        <div className="w-8">{rightAction}</div>
      </div>
    );

    // --- Speech Helper (Global) ---
    const speak = (text) => {
      if (!window.speechSynthesis || !text) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      let voices = window.speechSynthesis.getVoices();
      const preferredVoice = 
        voices.find(v => v.name === 'Samantha') || 
        voices.find(v => v.name === 'Daniel') ||
        voices.find(v => v.name.includes('Google US English')) ||
        voices.find(v => v.lang.startsWith('en'));
      if (preferredVoice) utterance.voice = preferredVoice;
      window.speechSynthesis.speak(utterance);
    };

    // --- WordSpan Component for Logic Isolation ---
    const WordSpan = ({ word, selectedWords, onToggleWord }) => {
       const cleanWord = word.toLowerCase();
       const isSelected = selectedWords.some(w => w.word.toLowerCase() === cleanWord);
       const timerRef = useRef(null);
       const isLongPress = useRef(false);

       const handleStart = (e) => {
          isLongPress.current = false;
          // 设置长按定时器 (500ms)
          timerRef.current = setTimeout(() => {
             isLongPress.current = true;
             speak(word); // 调用系统朗读
             if (navigator.vibrate) navigator.vibrate(50); // 震动反馈
          }, 500);
       };

       const handleEnd = (e) => {
          if (timerRef.current) clearTimeout(timerRef.current);
          if (!isLongPress.current) {
             // 短按 -> 切换黄金词汇
             onToggleWord && onToggleWord(word);
          }
       };

       const handleCancel = () => {
          if (timerRef.current) clearTimeout(timerRef.current);
       };

       return (
         <span 
           onPointerDown={handleStart}
           onPointerUp={handleEnd}
           onPointerLeave={handleCancel}
           style={{ touchAction: 'pan-y', WebkitUserSelect: 'none', userSelect: 'none' }} // 允许滚动但禁止原生选词
           className={`cursor-pointer rounded px-0.5 transition-all duration-200 ${
              isSelected 
                ? 'golden-highlight shadow-sm transform scale-105 inline-block mx-0.5' 
                : 'hover:bg-stone-100 hover:text-teal-600'
           }`}
         >
           {word}
         </span>
       );
    };

    // Clickable Text Container
    const ClickableText = ({ text, selectedWords, onToggleWord }) => {
      const parts = text.split(/([a-zA-Z\u00C0-\u00FF]+(?:['’][a-zA-Z\u00C0-\u00FF]+)?)/g);
      
      return (
        <span>
          {parts.map((part, i) => {
             if (!/^[a-zA-Z\u00C0-\u00FF]/.test(part)) return <span key={i}>{part}</span>;
             return (
               <WordSpan 
                 key={i} 
                 word={part} 
                 selectedWords={selectedWords} 
                 onToggleWord={onToggleWord} 
               />
             );
          })}
        </span>
      );
    };

    // --- Logic ---
    const callAI = async (sysMsg, userMsg) => {
      try {
        const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SILICON_KEY}` },
          body: JSON.stringify({
            model: "deepseek-ai/DeepSeek-V3",
            messages: [{ role: "system", content: sysMsg }, { role: "user", content: userMsg }],
            response_format: { type: "json_object" },
            stream: false
          })
        });
        const data = await res.json();
        let content = data.choices[0].message.content;
        content = content.replace(/```json\n?|```/g, '').trim();
        return JSON.parse(content);
      } catch (e) { console.error("AI Error", e); alert("AI服务繁忙，请重试"); throw e; }
    };

    // --- Views ---
    
    // 1. LOBBY
    const LobbyView = ({ onStart, history, onLoadHistory }) => (
      <div className="p-6 max-w-2xl mx-auto animate-fade space-y-8">
        <div className="bg-gradient-to-br from-teal-600 to-emerald-800 p-8 rounded-3xl text-white shadow-xl relative overflow-hidden group">
          <div className="relative z-10">
            <h1 className="text-3xl font-black mb-2">EchoMind</h1>
            <p className="opacity-90 mb-6 text-sm">DeepSeek 驱动 · 沉浸式口语私教</p>
            <Btn onClick={() => onStart(null)} className="bg-white text-teal-800 border-none">
              <Icon name="plus" size={18}/> 开启新对话
            </Btn>
          </div>
          <div className="absolute -bottom-10 -right-10 opacity-10 rotate-12">
             <Icon name="sparkles" size={120} />
          </div>
        </div>
        
        <div className="space-y-4">
          <div className="flex justify-between items-center px-2">
            <h3 className="text-xs font-bold text-stone-400 uppercase tracking-widest">历史记录</h3>
            <button onClick={onLoadHistory} className="text-stone-400 hover:text-teal-600"><Icon name="refresh-cw" size={14}/></button>
          </div>
          <div className="space-y-3">
            {history.map(s => (
              <div key={s.id} onClick={() => onStart(s)} className="bg-white p-4 rounded-xl border border-stone-100 hover:border-teal-400 cursor-pointer flex justify-between group shadow-sm transition-all">
                <div>
                  <div className="text-[10px] bg-orange-50 text-orange-600 inline-block px-2 py-0.5 rounded font-bold mb-1">
                    {s.grammar?.title || '语法练习'}
                  </div>
                  <div className="font-bold text-stone-700 line-clamp-1">{s.topic}</div>
                </div>
                {s.review && (
                  <div className="flex flex-col items-center justify-center pl-4 border-l border-stone-100">
                    <span className="text-emerald-600 font-black text-lg">{s.review.score}</span>
                    <span className="text-[8px] text-stone-300 uppercase">得分</span>
                  </div>
                )}
              </div>
            ))}
            {history.length === 0 && <div className="text-center text-stone-300 py-10 text-sm bg-white rounded-xl border border-dashed border-stone-200">暂无历史记录</div>}
          </div>
        </div>
      </div>
    );

    // 2. CONFIG
    const ConfigView = ({ step, grammarList, onSelectGrammar, topic, setTopic, onGenWords, words, onToggleWord, onConfirmConfig, loading, onHome }) => {
      const isWordStep = step === 'words';
      const isInputStep = step === 'input';
      const isGrammarStep = step === 'grammar';
      
      const [showDropdown, setShowDropdown] = useState(false);
      const [tempGrammar, setTempGrammar] = useState(null);

      const stepTitles = {
        grammar: "第一步：选择黄金句型",
        input: "第二步：输入对话主题",
        words: "第三步：挑选核心词汇"
      };

      return (
        <div className="p-6 max-w-2xl mx-auto animate-fade min-h-[80vh] flex flex-col">
          <Header onHome={onHome} />
          
          <div className="flex-1 space-y-6">
            <div className="text-center space-y-2 mt-4">
              <div className="text-teal-600 text-xs font-bold uppercase tracking-widest">Setup Phase</div>
              <h2 className="text-2xl font-black text-stone-800">{stepTitles[step]}</h2>
            </div>

            {/* Grammar Step with Dropdown UI */}
            {isGrammarStep && (
              <div className="space-y-4">
                 <div className="relative">
                    <button 
                      onClick={() => setShowDropdown(!showDropdown)}
                      className="w-full bg-white border-2 border-stone-200 rounded-2xl p-4 flex items-center justify-between shadow-sm hover:border-teal-500 transition-all text-left"
                    >
                      <div>
                        <div className="text-xs text-stone-400 uppercase font-bold mb-1">当前选择</div>
                        <div className="text-lg font-bold text-stone-800">
                           {tempGrammar ? tempGrammar.title : "请点击选择语法句型"}
                        </div>
                        {tempGrammar && <div className="text-xs text-stone-500 mt-1">{tempGrammar.explanation}</div>}
                      </div>
                      <Icon name="chevron-down" className={`transition-transform duration-300 ${showDropdown ? 'rotate-180' : ''}`} />
                    </button>

                    {/* Dropdown Menu */}
                    {showDropdown && (
                      <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-stone-100 rounded-2xl shadow-xl z-50 max-h-[60vh] overflow-y-auto p-2 animate-slide-up">
                        {grammarList.map(g => (
                          <div 
                            key={g.id} 
                            onClick={() => { setTempGrammar(g); setShowDropdown(false); onSelectGrammar(g); }}
                            className="p-3 hover:bg-teal-50 rounded-xl cursor-pointer border-b border-stone-50 last:border-0"
                          >
                            <div className="flex justify-between items-center">
                              <span className="font-bold text-stone-700">{g.title}</span>
                              <span className="text-[10px] text-stone-300 font-mono bg-stone-100 px-1 rounded">{g.structure}</span>
                            </div>
                            <div className="text-xs text-stone-500 mt-0.5">{g.explanation}</div>
                          </div>
                        ))}
                      </div>
                    )}
                 </div>
              </div>
            )}

            {isInputStep && (
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 animate-fade">
                <textarea 
                  autoFocus value={topic} onChange={e => setTopic(e.target.value)} 
                  placeholder="你想聊点什么？例如：\n我正在计划去日本旅游...\n我想讨论一下人工智能的未来..."
                  className="w-full h-32 text-lg font-medium outline-none resize-none placeholder:text-stone-300 text-stone-700"
                />
                <Btn onClick={onGenWords} disabled={!topic.trim() || loading} className="w-full mt-4">
                  {loading ? <span className="animate-pulse">AI生成中...</span> : "生成核心词汇"} <Icon name="arrow-right" size={18}/>
                </Btn>
              </div>
            )}

            {isWordStep && (
              <div className="space-y-3 animate-fade">
                {words?.candidateWords?.map(w => {
                  const active = words.selected.some(s => s.word === w.word);
                  return (
                    <div key={w.word} onClick={() => onToggleWord(w)} 
                      className={`p-4 rounded-xl border-2 cursor-pointer flex justify-between items-center transition-all ${active ? 'border-amber-400 bg-amber-50 shadow-md' : 'border-white bg-white hover:border-teal-100'}`}>
                      <div>
                        <div className="font-bold text-lg">{w.word} <span className="text-xs text-stone-400 font-normal">{w.ipa}</span></div>
                        <div className="text-sm text-stone-500">{w.mean}</div>
                      </div>
                      {active && <Icon name="check-circle-2" className="text-amber-500" />}
                    </div>
                  )
                })}
              </div>
            )}
          </div>

          {isWordStep && (
             <Btn onClick={onConfirmConfig} disabled={words.selected.length === 0} className="w-full mb-6">
               开始对话 <Icon name="message-circle" size={18}/>
             </Btn>
          )}
        </div>
      );
    };

    // 3. CHAT
    const ChatView = ({ messages, hints, onSend, onHint, onReview, loading, config, onHome, onToggleWord }) => {
      const [input, setInput] = useState("");
      const endRef = useRef(null);
      
      useEffect(() => {
        const load = () => { window.speechSynthesis.getVoices(); };
        load();
        window.speechSynthesis.onvoiceschanged = load;
      }, []);

      useEffect(() => {
        if(endRef.current) endRef.current.scrollIntoView({ behavior: "smooth" });
      }, [messages, hints]);

      const handleSend = () => { if(input.trim()) { onSend(input); setInput(""); } };

      return (
        <div className="flex flex-col h-screen bg-stone-50">
          <header className="bg-white/90 backdrop-blur border-b p-3 flex justify-between items-center sticky top-0 z-10 shadow-sm">
            <button onClick={onHome} className="p-2 hover:bg-stone-100 rounded-full text-stone-500 flex items-center gap-1">
              <Icon name="home" size={18} />
              <span className="text-xs font-bold hidden sm:inline">首页</span>
            </button>
            
            {/* 顶部黄金词汇栏 - 支持删除 */}
            <div className="flex gap-2 text-xs font-bold overflow-x-auto no-scrollbar max-w-[60%] px-2">
              <span className="bg-stone-100 text-stone-600 px-2 py-1 rounded whitespace-nowrap flex items-center gap-1 border border-stone-200">
                <Icon name="target" size={10}/> {config.grammar.title}
              </span>
              {config.words.map(w => (
                <span key={w.word} className="golden-highlight px-2 py-1 rounded whitespace-nowrap flex items-center gap-1 group transition-all">
                  {w.word}
                  <button 
                    onClick={() => onToggleWord(w.word)}
                    className="ml-1 opacity-50 group-hover:opacity-100 hover:text-red-600 hover:scale-110 transition-all focus:outline-none"
                    title="删除此词"
                  >
                    <Icon name="x" size={10} />
                  </button>
                </span>
              ))}
              {config.words.length === 0 && (
                <span className="text-stone-300 text-[10px] italic py-1">点击对话中的单词添加...</span>
              )}
            </div>
            
            <button onClick={onReview} disabled={messages.length < 2} className="text-stone-400 hover:text-teal-600 p-2 flex items-center gap-1">
              <Icon name="trophy" size={18}/>
              <span className="text-xs font-bold hidden sm:inline">复盘</span>
            </button>
          </header>

          <div className="flex-1 overflow-y-auto p-4 space-y-6">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade`}>
                <div className={`max-w-[85%] rounded-2xl p-4 shadow-sm ${m.role === 'user' ? 'bg-white rounded-tr-none' : 'bg-white rounded-tl-none'}`}>
                  {m.role === 'user' && (
                     <div className="mb-2 pb-2 border-b border-stone-50 text-sm text-stone-400">{m.text}</div>
                  )}
                  
                  {/* Message Content with Clickable/Highlighted Words */}
                  <div className="relative">
                    <div className="flex justify-between items-start gap-2 mb-1">
                      {m.role === 'user' && <span className="text-[10px] text-teal-300 font-bold uppercase tracking-wider">Refined</span>}
                      {m.role === 'assistant' && <span className="text-[10px] text-stone-300 font-bold uppercase tracking-wider">Coach</span>}
                      
                      <button 
                        onClick={() => speak(m.role === 'user' ? m.refined : m.en)}
                        className={`p-1 rounded-full transition-colors ${m.role === 'user' ? 'hover:bg-teal-50 text-teal-200 hover:text-teal-600' : 'hover:bg-stone-100 text-stone-300 hover:text-stone-600'}`}
                        title="朗读整句"
                      >
                        <Icon name="volume-2" size={14} />
                      </button>
                    </div>
                    
                    <div className={`text-lg font-medium leading-relaxed ${m.role==='user'?'text-teal-700':'text-stone-800'}`}>
                      {/* Both User (Refined) and Assistant text show highlights */}
                      <ClickableText 
                        text={m.role === 'user' ? (m.refined || "") : m.en} 
                        selectedWords={config.words} 
                        onToggleWord={onToggleWord} 
                      />
                    </div>
                  </div>

                  {m.role === 'assistant' && <div className="mt-2 pt-2 border-t border-stone-50 text-sm text-stone-400">{m.cn}</div>}
                </div>
              </div>
            ))}
            
            {hints.length > 0 && (
              <div className="flex flex-col items-end gap-2 animate-fade">
                <span className="text-[10px] text-stone-400 font-bold uppercase mr-1">参考回复</span>
                {hints.map((h,i) => (
                  <button key={i} onClick={() => setInput(h.en)} className="text-left bg-white border border-teal-200 p-3 rounded-xl hover:bg-teal-50 max-w-[80%] shadow-sm transition-colors">
                    <div className="font-bold text-teal-800 text-sm">{h.en}</div>
                    <div className="text-xs text-stone-400">{h.cn}</div>
                  </button>
                ))}
              </div>
            )}
            
            {loading && <div className="text-center text-xs text-stone-400 animate-pulse mt-4 flex items-center justify-center gap-2"><Icon name="loader-2" size={12} className="animate-spin"/> AI正在思考...</div>}
            <div ref={endRef} className="h-10" />
          </div>

          <div className="bg-white border-t p-4 pb-8 space-y-3">
            <div className="flex gap-2">
              <Btn variant="ghost" onClick={onHint} disabled={loading} className="flex-1 py-2 text-xs bg-amber-50 text-amber-600">
                <Icon name="lightbulb" size={14}/> 提示
              </Btn>
              <Btn variant="ghost" onClick={onReview} disabled={messages.length < 2} className="flex-1 py-2 text-xs bg-indigo-50 text-indigo-600">
                <Icon name="clipboard-check" size={14}/> 生成复盘
              </Btn>
            </div>
            <div className="flex gap-2">
              <input 
                value={input} onChange={e => setInput(e.target.value)} 
                onKeyDown={e => e.key === 'Enter' && handleSend()}
                placeholder="请输入你的回答..."
                className="flex-1 bg-stone-100 rounded-xl px-4 outline-none focus:ring-2 focus:ring-teal-500/20 text-stone-700"
              />
              <Btn onClick={handleSend} disabled={!input.trim() || loading} className="py-3 px-4"><Icon name="send" size={18}/></Btn>
            </div>
          </div>
        </div>
      );
    };

    // 4. REVIEW
    const ReviewView = ({ review, onHome }) => (
      <div className="p-6 max-w-2xl mx-auto animate-fade pb-20">
        <Header onHome={onHome} />
        
        <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-stone-100">
          <div className="bg-stone-900 p-8 text-center text-white relative overflow-hidden">
            <div className="relative z-10">
                <div className="text-5xl font-black text-amber-400 mb-1">{review.score}</div>
                <div className="text-xs opacity-50 uppercase tracking-widest">本次得分</div>
            </div>
            <Icon name="award" className="absolute -bottom-6 -right-6 opacity-10" size={100} />
          </div>
          <div className="p-6 space-y-6">
             {/* Corrections */}
             <div className="space-y-3">
               <h3 className="text-xs font-bold text-rose-500 uppercase flex items-center gap-1"><Icon name="x-circle" size={14}/> 表达纠错</h3>
               {review.corrections?.map((c,i) => (
                 <div key={i} className="bg-rose-50 p-4 rounded-xl border border-rose-100">
                   <div className="line-through text-stone-400 text-sm mb-1">{c.original}</div>
                   <div className="font-bold text-stone-800">{c.correction}</div>
                   <div className="text-xs text-rose-500 mt-2">{c.reason}</div>
                 </div>
               ))}
               {(!review.corrections || review.corrections.length === 0) && <div className="text-sm text-stone-400 text-center py-2">太棒了，没有明显语法错误！</div>}
             </div>

             <div className="space-y-3">
                <h3 className="text-xs font-bold text-orange-500 uppercase flex items-center gap-1"><Icon name="target" size={14}/> 语法运用</h3>
                <div className="bg-orange-50 p-4 rounded-xl text-sm text-stone-600 leading-relaxed">{review.patternAnalysis}</div>
             </div>

             <div className="space-y-3">
                <h3 className="text-xs font-bold text-teal-600 uppercase flex items-center gap-1"><Icon name="trending-up" size={14}/> 提升建议</h3>
                <div className="bg-teal-50 p-4 rounded-xl text-sm text-stone-600 leading-relaxed">{review.weakness}</div>
             </div>

             <Btn onClick={onHome} className="w-full">返回主页</Btn>
          </div>
        </div>
      </div>
    );

    // --- MAIN APP ---
    const App = () => {
      const [view, setView] = useState('lobby'); 
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(false);
      
      const [grammar, setGrammar] = useState(null);
      const [topic, setTopic] = useState("");
      const [wordCandidates, setWordCandidates] = useState([]);
      const [selectedWords, setSelectedWords] = useState([]);
      const [messages, setMessages] = useState([]);
      const [review, setReview] = useState(null);
      const [hints, setHints] = useState([]);
      const [sessionId, setSessionId] = useState(null);

      const fetchHistory = async () => {
        try {
          const { data, error } = await db.from('sessions').select('*').eq('user_id', USER_ID).order('created_at', { ascending: false });
          if (data) setHistory(data);
        } catch(e) { console.log("Offline or Config Error"); }
      };

      const saveSession = async (updates) => {
        try {
          if (!sessionId) {
            const { data } = await db.from('sessions').insert([{
              user_id: USER_ID,
              topic,
              grammar: JSON.stringify(grammar),
              words: JSON.stringify(selectedWords),
              messages: JSON.stringify(updates.messages || messages),
              ...updates
            }]).select();
            if (data && data[0]) setSessionId(data[0].id);
          } else {
            await db.from('sessions').update({ 
              messages: JSON.stringify(updates.messages || messages),
              review: updates.review ? JSON.stringify(updates.review) : undefined,
              words: JSON.stringify(updates.words || selectedWords)
            }).eq('id', sessionId);
          }
        } catch(e) {}
      };

      useEffect(() => { fetchHistory(); }, []);

      const goHome = () => { fetchHistory(); setView('lobby'); };

      // Handlers
      const handleStart = (existingSession) => {
        if (existingSession) {
          setGrammar(typeof existingSession.grammar === 'string' ? JSON.parse(existingSession.grammar) : existingSession.grammar);
          setTopic(existingSession.topic);
          setSelectedWords(typeof existingSession.words === 'string' ? JSON.parse(existingSession.words) : existingSession.words);
          setMessages(typeof existingSession.messages === 'string' ? JSON.parse(existingSession.messages) : existingSession.messages);
          setReview(typeof existingSession.review === 'string' ? JSON.parse(existingSession.review) : existingSession.review);
          setSessionId(existingSession.id);
          setView(existingSession.review ? 'review' : 'chat');
        } else {
          setGrammar(null); setTopic(""); setSelectedWords([]); setMessages([]); setSessionId(null); setReview(null);
          setView('config_grammar');
        }
      };

      const handleGenWords = async () => {
        setLoading(true);
        try {
          const res = await callAI(PROMPTS.words(grammar.title, grammar.structure), topic);
          setWordCandidates(res.candidateWords);
          setView('config_words');
        } finally { setLoading(false); }
      };

      const handleStartChat = async () => {
        setLoading(true);
        try {
          const initMsg = { role: 'assistant', en: `Let's talk about "${topic}" using ${grammar.title} (${grammar.structure}).`, cn: "准备好了吗？", refined: "" };
          setMessages([initMsg]);
          setView('chat');
          await saveSession({ messages: [initMsg] });
        } finally { setLoading(false); }
      };

      const handleSendMessage = async (txt) => {
        const newMsgs = [...messages, { role: 'user', text: txt }];
        setMessages(newMsgs);
        setLoading(true);
        setHints([]);
        try {
          const context = newMsgs.slice(-4).map(m => m.role === 'user' ? `User:${m.text}` : `AI:${m.en}`).join('\n');
          const res = await callAI(PROMPTS.chat(selectedWords.map(w=>w.word).join(','), grammar.title), context + `\nUser Input: ${txt}`);
          const finalMsgs = [
            ...newMsgs.slice(0, -1),
            { role: 'user', text: txt, refined: res.userRefinedEn },
            { role: 'assistant', en: res.aiResponseEn, cn: res.aiResponseCn }
          ];
          setMessages(finalMsgs);
          await saveSession({ messages: finalMsgs });
        } finally { setLoading(false); }
      };

      const handleReview = async () => {
        setLoading(true);
        try {
          const ctx = JSON.stringify(messages);
          const res = await callAI(PROMPTS.review, `Context:${ctx}. Grammar:${grammar.title}`);
          setReview(res);
          setView('review');
          await saveSession({ review: res });
          fetchHistory();
        } finally { setLoading(false); }
      };

      const handleHint = async () => {
        setLoading(true);
        try {
          const res = await callAI(PROMPTS.hint(JSON.stringify(messages.slice(-2))), "Give hints");
          setHints(res);
        } finally { setLoading(false); }
      };

      // Toggle word in chat or config
      const toggleWord = (wordStr) => {
        const word = { word: wordStr, mean: 'Added in Chat', ipa: '' };
        const exists = selectedWords.some(w => w.word.toLowerCase() === wordStr.toLowerCase());
        const newWords = exists 
          ? selectedWords.filter(w => w.word.toLowerCase() !== wordStr.toLowerCase())
          : [...selectedWords, word];
        
        setSelectedWords(newWords);
        // Sync to DB if chatting
        if (view === 'chat' && sessionId) {
          saveSession({ words: newWords });
        }
      };

      return (
        <div className="min-h-screen bg-stone-50">
          {view === 'lobby' && <LobbyView history={history} onStart={handleStart} onLoadHistory={fetchHistory} />}
          
          {view.startsWith('config') && (
            <ConfigView 
              step={view.split('_')[1]} loading={loading}
              grammarList={GRAMMAR_LIST}
              onSelectGrammar={(g) => { setGrammar(g); setView('config_input'); }}
              topic={topic} setTopic={setTopic}
              onGenWords={handleGenWords}
              words={{ candidateWords: wordCandidates, selected: selectedWords }}
              onToggleWord={(w) => {
                 // Config toggle logic
                 const exists = selectedWords.some(x => x.word === w.word);
                 const newWords = exists ? selectedWords.filter(x => x.word !== w.word) : [...selectedWords, w];
                 setSelectedWords(newWords);
              }}
              onConfirmConfig={handleStartChat}
              onHome={goHome}
            />
          )}

          {view === 'chat' && (
             <ChatView 
               messages={messages} hints={hints} loading={loading} 
               config={{grammar, words: selectedWords}}
               onSend={handleSendMessage} onHint={handleHint} onReview={handleReview}
               onHome={goHome}
               onToggleWord={toggleWord}
             />
          )}

          {view === 'review' && review && <ReviewView review={review} onHome={goHome} />}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
